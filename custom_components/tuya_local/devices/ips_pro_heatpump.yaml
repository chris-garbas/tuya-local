name: IPS Inverter Heatpump
primary_entity:
  entity: climate
  dps:
    - id: 1
      name: power
      type: boolean
      mapping:
        - dps_val: false
          value: "off"
          icon: "mdi:hvac-off"
          icon_priority: 1
      hidden: true
    - id: 105
      name: hvac_mode
      type: string
      mapping:
        - dps_val: auto
          icon: "mdi:refresh-auto"
          icon_priority: 1
          constraint: power
          conditions:
            - dps_val: false
              value_redirect: power
            - dps_val: true
              value: auto
        - dps_val: cold
          icon: "mdi:snowflake"
          icon_priority: 2
          constraint: power
          conditions:
            - dps_val: false
              value_redirect: power
              value: "off"
            - dps_val: true
              value: cool
        - dps_val: heating
          icon: "mdi:hot-tub"
          icon_priority: 3
          constraint: power
          conditions:
            - dps_val: false
              value_redirect: power
            - dps_val: true
              value: warm
    - id: 2
      name: preset_mode
      type: string
      mapping:
        - dps_val: "silence"
          value: "silence"
        - dps_val: "smart"
          value: "smart"
        - dps_val: "booster"
          value: "booster"
    - id: 102
      name: current_temperature
      type: integer
      readonly: true
    - id: 103
      name: temperature_unit
      type: boolean
      mapping:
        - dps_val: false
          value: F
        - dps_val: true
          value: C
    - id: 106
      name: temperature
      type: integer
      mapping:
        - constraint: temperature_unit
          conditions:
            - dps_val: false
              range:
                min: 60
                max: 115
            - dps_val: true
              range:
                min: 18
                max: 40
    - id: 107
      type: integer
      name: min_temperature
      readonly: true
    - id: 108
      type: integer
      name: max_temperature
      readonly: true
    - id: 115
      type: integer
      name: unknown_115
    - id: 116
      type: integer
      name: unknown_116
secondary_entities:
  - entity: sensor
    name: Power Level
    class: power_factor
    icon: "mdi:signal"
    category: diagnostic
    dps:
      - id: 104
        name: sensor
        type: integer
        unit: "%"
        class: measurement
        readonly: true

  - entity: sensor
    name: Current Temperature
    class: temperature
    dps:
      - id: 102
        type: integer
        name: sensor
        readonly: true
      - id: 103
        name: unit
        type: string
        mapping:
          - dps_val: false
            value: F
          - dps_val: true
            value: C