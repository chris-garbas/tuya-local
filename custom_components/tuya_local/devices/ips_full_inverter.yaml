name: IPS Pool Heatpump
primary_entity:
  entity: climate
  dps:
    - id: 1
      name: ips_on_off
      type: boolean
      mapping:
        - dps_val: false
          value: "off"
          icon: "mdi:hvac-off"
          icon_priority: 1
        - dps_val: true
          value: "heat"
          icon: "mdi:hot-tub"
          icon_priority: 3
    - id: 2
      name: ips_mode
      type: string
      mapping:
        - dps_val: silence
          value: "silence"
          icon: "mdi:hot-tub"
          icon_priority: 1
        - dps_val: smart
          value: "smart"
          icon: "mdi:hot-tub"
          icon_priority: 3
        - dps_val: turbo
          value: "turbo"
          icon: "mdi:hot-tub"
          icon_priority: 3
    - id: 102
      name: ips_ingoing_temperature
      type: integer
      readonly: true
    - id: 103
      name: temperature_unit
      type: boolean
      mapping:
        - dps_val: false
          value: F
        - dps_val: true
          value: C
    - id: 104
      name: ips_power_level
      type: integer
      readonly: true
    - id: 105
      name: ips_action
      type: string
      readonly: true
      mapping:
        - dps_val: warm
          constraint: hvac_mode
          conditions:
            - dps_val: false
              value: "off"
            - dps_val: true
              value: idle
    - id: 106
      name: temperature
      type: integer
      mapping:
        - constraint: temperature_unit
          conditions:
            - dps_val: false
              range:
                min: 60
                max: 115
            - dps_val: true
              range:
                min: 18
                max: 40
      range:
        min: 18
        max: 45
    - id: 107
      type: integer
      name: unknown_107
    - id: 108
      type: integer
      name: unknown_108
    - id: 115
      type: integer
      name: unknown_115
    - id: 116
      type: integer
      name: unknown_116
